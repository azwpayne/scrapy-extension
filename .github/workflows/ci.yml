name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast unit job — runs on every push to main. No external services required.
  # Integration tests (tests/integration/, marker `integration`) are
  # deselected here; they need live backends and are run in the parallel
  # integration-tests job below.
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: python -m pip install uv==0.11.29
      - name: Sync dependencies (test group)
        run: uv sync --python ${{ matrix.python-version }} --locked --group test
      - name: Verify project Python ${{ matrix.python-version }}
        run: >-
          uv run --no-sync python -c
          "import sys; expected = tuple(map(int, '${{ matrix.python-version }}'.split('.')));
          assert sys.version_info[:2] == expected, (sys.version, expected)"
      - name: Ruff
        run: uv run --no-sync ruff check
      - name: Mypy (strict)
        if: matrix.python-version == '3.10'
        run: uv run --no-sync mypy --strict src
      - name: Bandit
        if: matrix.python-version == '3.10'
        run: uv run --no-sync bandit -r src -c pyproject.toml
      - name: Dependency vulnerability audit
        if: matrix.python-version == '3.10'
        # PyPA's PYSEC record lacks a fixed event, while the reviewed GHSA
        # limits impact to Scrapy <=2.15.2. The lock uses 2.17.0; keep this
        # exception exact so every other present or future advisory fails CI.
        run: uv audit --locked --ignore PYSEC-2017-83
      - name: Pytest xdist/benchmark compatibility canary
        if: matrix.python-version == '3.10'
        run: >-
          uv run --no-sync pytest -n 2 --benchmark-disable
          tests/test_memory_filter.py::TestMemoryMembershipFilter::test_add_new_returns_true -q
      - name: Build package artifacts
        if: matrix.python-version == '3.10'
        run: uv build --python ${{ matrix.python-version }}
      - name: Smoke-test package artifacts
        if: matrix.python-version == '3.10'
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          uv venv --python ${{ matrix.python-version }} .venv-package-smoke
          uv pip install --python .venv-package-smoke/bin/python --no-deps "${wheels[0]}"
          .venv-package-smoke/bin/python -c "import importlib.util; from importlib.metadata import version; assert importlib.util.find_spec('scrapy_extension'); assert version('scrapy-extension')"
      - name: Unit tests with coverage (integration deselected)
        if: matrix.python-version == '3.10'
        run: >
          uv run --no-sync pytest -m "not integration" --tb=short -q
          --cov=scrapy_extension --cov-report=term-missing
      - name: Unit tests (integration deselected)
        if: matrix.python-version != '3.10'
        run: uv run --no-sync pytest -m "not integration" --tb=short -q

  # Integration job — runs tests under tests/integration/ against
  # containerized backends. Runs in parallel with unit-tests so it never
  # blocks the fast unit lane.
  #
  # Service healthchecks: redis/mongodb/elasticsearch/rabbitmq all expose
  # a real healthcheck command. Kafka has no trivial CLI healthcheck in the
  # bitnami image, so we fall back to a TCP port probe in a wait step.
  #
  # RocketMQ runs via docker-compose (tests/integration/docker-compose.yml),
  # not the services block, because its broker needs --enable-proxy + a
  # mounted rmq-proxy.json (enableAutoTopicCreation) + broker.conf, and the
  # apache 5.x client speaks gRPC to the proxy (8081). The pure-Python client
  # (rocketmq-python-client 5.1.1) needs no native lib, so the suite runs on
  # the stock GitHub runner. See #44.
  integration-tests:
    runs-on: ubuntu-latest
    # Bound the whole job. A hung broker-client op (no per-op timeout) used to
    # bleed to GitHub Actions' 360-min default — every run since the #44 series
    # landed as cancelled-at-6h. 15 min is generous (broker bring-up ~2 min +
    # the integration suite under per-test --timeout below).
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmqctl status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: bitnamilegacy/kafka:4.0.0-debian-12-r10
        env:
          KAFKA_CFG_NODE_ID: "1"
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        ports:
          - 9092:9092
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.11.29
      - name: Sync dependencies (test group + all backend extras)
        run: uv sync --python 3.12 --locked --group test --all-extras
      - name: Verify project Python 3.12
        run: >-
          uv run --no-sync python -c
          "import sys; assert sys.version_info[:2] == (3, 12), sys.version"
      - name: Wait for Kafka port (no CLI healthcheck in bitnami image)
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/9092) >/dev/null 2>&1; then
              echo "Kafka broker accepting connections on 9092"
              exit 0
            fi
            echo "kafka not ready ($i/30)"; sleep 5
          done
          echo "Kafka did not become ready in time" >&2
          exit 1
      - name: Bring up RocketMQ (namesrv + broker with --enable-proxy)
        # The broker needs --enable-proxy (gRPC on 8081) + a mounted
        # rmq-proxy.json (enableAutoTopicCreation) + broker.conf, which the
        # GitHub Actions `services` block can't express cleanly. docker-compose
        # reuses the validated fixture (same networking the _ensure_topic
        # helper's defaults assume: rocketmq-namesrv / scrapy-ext-rocketmq-broker).
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d --wait rocketmq-namesrv rocketmq-broker
          # Extra warmup: the proxy port opens before topic-service is fully
          # registered. Poll a route fetch via the python client.
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/8081) >/dev/null 2>&1; then
              echo "RocketMQ gRPC proxy accepting connections on 8081"
              exit 0
            fi
            echo "rocketmq-proxy not ready ($i/30)"; sleep 5
          done
          echo "RocketMQ proxy did not become ready in time" >&2
          exit 1
      - name: Run integration tests
        env:
          # Global opt-in gate (root conftest.py): without SCRAPY_TEST_INTEGRATION=1,
          # every integration test SKIPS via the conftest-level guard and this job
          # validates nothing (false green — the per-backend URLs alone are not
          # enough; this flag is what actually enables the suite). Verified:
          # Unset means the entire live-service suite skips (a false green).
          SCRAPY_TEST_INTEGRATION: "1"
          SCRAPY_TEST_REDIS_URL: redis://localhost:6379/0
          SCRAPY_TEST_MONGODB_URI: mongodb://localhost:27017
          SCRAPY_TEST_ES_HOSTS: http://localhost:9200
          SCRAPY_TEST_RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          SCRAPY_TEST_KAFKA_BOOTSTRAP: localhost:9092
          # gRPC PROXY endpoint (host:8081), NOT the NameServer. The broker
          # runs with --enable-proxy via the compose step above.
          SCRAPY_TEST_ROCKETMQ_NAMESRV: localhost:8081
        # Global addopts (pyproject.toml) set --disable-socket. That blocks the
        # broker connections this job needs — redis/mongo/es/rabbitmq error fast
        # (SocketBlockedError), but RocketMQ's apache gRPC client retries the
        # blocked connection with no cap and HANGS (the original 6h-bleed root
        # cause). --allow-hosts opens localhost, where every CI broker lives, so
        # the suite can reach them while external sockets stay blocked.
        run: >
          uv run --no-sync pytest tests/integration
          -m integration --tb=short -v --timeout=120
          --allow-hosts=localhost,127.0.0.1,::1
