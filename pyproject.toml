[project]
name = "scrapy-extension"
version = "0.1.0"
description = "Provide distributed support for scrapy"
readme = "README.md"
authors = [{ name = "azwpayne", email = "paynewu0719@gmail.com" }]
requires-python = ">=3.10"
dependencies = ["pydantic>=2.12.5", "scrapy>=2.14.1", "scrapy-redis"]

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"


[dependency-groups]
dev = ["ruff>=0.15.2", "ty>=0.0.18", "uv>=0.10.4"]
[tool.uv]
workspace.members = ["src/scrapy_redis"]

[tool.ruff]
target-version = "py310"
# line-length = 88
# indent-width = 4
lint.select = ["ALL"]
lint.ignore = ["E501", "F821", "ERA001"]
