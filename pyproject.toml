[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[project]
name = "scrapy-extension"
version = "0.1.0"
description = "multi backend components for Scrapy."
readme = "README.md"
authors = [
    { name = "azwpayne", email = "paynewu0719@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "pydantic-settings>=2.13.1",
    "redis>=7.3.0",
    "scrapy>=2.14.2",
]

[project.optional-dependencies]
mongodb = ["pymongo>=4.5.0"]
kafka = ["kafka-python>=2.0.2"]
rabbitmq = ["pika>=1.3.2"]
all = ["pymongo>=4.5.0", "kafka-python>=2.0.2", "pika>=1.3.2"]

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "pytest>=9.0.2",
    "ruff>=0.15.6",
    "ty>=0.0.23",
]

