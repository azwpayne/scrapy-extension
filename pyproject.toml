[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[project]
name = "scrapy-extension"
version = "0.1.0"
description = "multi backend components for Scrapy."
readme = "README.md"
authors = [
    { name = "azwpayne", email = "paynewu0719@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "pydantic-settings>=2.13.1",
    "redis>=7.3.0",
    "scrapy>=2.14.2",
]

[project.optional-dependencies]
mongodb = ["pymongo>=4.5.0"]
kafka = ["kafka-python>=2.0.2"]
rabbitmq = ["pika>=1.3.2"]
all = ["pymongo>=4.5.0", "kafka-python>=2.0.2", "pika>=1.3.2"]

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "ruff>=0.15.6",
    "ty>=0.0.23",
]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-xdist",
    "pytest-mock",
    "pytest-benchmark",
    "pytest-timeout",
    "pytest-sugar",
    "pytest-factoryboy",
]


[tool.poe]
executor.type = "uv"
tasks.full = ["clean", "format"]
tasks.test = [
    "clean",
    "test-py310",
    "test-py311",
    "test-py312",
    "test-py313",
    "test-py314"
]

tasks.format = "ruff format"
tasks.lint = "ruff check --fix --unsafe-fixes"

tasks.test-py310 = { shell = "uv run --python 3.10 --group test pytest" }
tasks.test-py311 = { shell = "uv run --python 3.11 --group test pytest" }
tasks.test-py312 = { shell = "uv run --python 3.12 --group test pytest" }
tasks.test-py313 = { shell = "uv run --python 3.13 --group test pytest" }
tasks.test-py314 = { shell = "uv run --python 3.14 --group test pytest" }




tasks.clean = { shell = """
	rm -rf *.py
	rm -rf .pytest_cache htmlcov .coverage coverage.xml .ruff_cache .benchmarks
	find . -type d -name __pycache__ -exec rm -rf {} +
	find . -type f -name "*.pyc" -delete
""" }


[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 30
addopts = """\
    -n=auto \
    --strict-markers \
    --tb=short \
    --cov=src/scrapy_extension \
    --cov-report=term-missing \
    --cov-report=html \
    --cov-report=xml \
    --cov-branch \
    """

[tool.pytest_benchmark]
min_rounds = 5
min_time = 0.000005
max_time = 1.0
calibration_precision = 10
warmup = true
warmup_iterations = 100000

