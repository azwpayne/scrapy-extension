# RocketMQ broker config for the scrapy-extension integration-test fixture.
# Mounted into the apache/rocketmq:5.3.1 broker container.
brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
deleteWhen=04
fileReservedTime=48
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH

# Let the backend auto-create topics on first push (the integration suite
# pushes to a UUID-suffixed topic per test). Standalone default is true; set
# explicitly so a future image default change can't silently break the suite.
autoCreateTopicEnable=true
autoCreateSubscriptionGroup=true

# Advertise 127.0.0.1 so a host-side Python client (rocketmq-client-python)
# can reach the broker after the nameserver hands back its address. Without
# this the broker advertises its container hostname (e.g. scrapy-ext-rocketmq-broker),
# which the host can't resolve — push/pop silently fail. This is the standard
# docker-compose-from-host gotcha for RocketMQ.
brokerIP1=127.0.0.1
listenPort=10911
